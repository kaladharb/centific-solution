services:
  - type: web
    name: voltedge-backend
    env: python
    plan: free
    rootDir: backend
    pythonVersion: 3.11.9
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: gunicorn "app:create_app()" --bind 0.0.0.0:10000 --workers 2 --worker-class sync --timeout 30
    envVars:
      - key: DATABASE_URL
        scope: build
        value: postgresql://voltedge:password@localhost/voltedge_db
      - key: JWT_SECRET_KEY
        scope: build
      - key: ANTHROPIC_API_KEY
        scope: build
      - key: FRONTEND_URL
        scope: build
        value: https://centific-solution.onrender.com

  - type: static
    name: voltedge-frontend
    rootDir: frontend
    staticPublishPath: dist
    buildCommand: npm install && npm run build
    routes:
      - path: /
        destination: index.html
      - path: /api*
        destination: http://voltedge-backend:10000
