services:
  - type: web
    name: voltedge-backend
    repo: https://github.com/kaladharb/centific-solution.git
    branch: main
    env: python
    pythonVersion: 3.11
    buildCommand: cd backend && pip install --upgrade pip && pip install -r requirements.txt
    startCommand: cd backend && gunicorn "app:create_app()" --bind 0.0.0.0:$PORT --workers 2 --worker-class sync --timeout 30
    envVars:
      - key: DATABASE_URL
        value: <your_render_internal_db_url>
      - key: JWT_SECRET_KEY
        value: <your_jwt_secret>
      - key: ANTHROPIC_API_KEY
        value: <your_anthropic_key>
      - key: FRONTEND_URL
        value: https://centific-solution.onrender.com

  - type: static
    name: voltedge-frontend
    rootDir: frontend
    staticPublishPath: dist
    buildCommand: npm install && npm run build
    routes:
      - path: /
        destination: index.html
      - path: /api*
        destination: http://voltedge-backend:10000
